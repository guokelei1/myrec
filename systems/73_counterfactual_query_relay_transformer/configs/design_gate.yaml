    - counterfactual_query_relay
    - late_state_difference
    - pooled_query_relay
    - factual_query_relay
  hidden_dimension: 64
  heads: 4
  ffn_dimension: 128
  dropout: 0.0
  correction_cap: 3.0

training:
  seeds: [20265001, 20265002, 20265003]
  batch_size: 128
  steps: 600
  learning_rate: 0.001
  weight_decay: 0.0001
  gradient_clip_norm: 1.0

evaluation:
  ndcg_k: 10
  supported_primary_min: 0.72
  supported_gain_over_base_min: 0.10
  primary_minus_late_min: 0.025
  primary_minus_pooled_min: 0.025
  primary_minus_factual_min: 0.010
  wrong_gain_retention_max: 0.45
  shuffled_gain_retention_max: 0.55
  coarse_gain_retention_max: 0.55
  query_mask_gain_retention_max: 0.05
  repeat_ndcg_min: 0.995
  no_history_ndcg_min: 0.995
  exact_fallback_tolerance: 0.0
  candidate_permutation_tolerance: 0.000001
  deterministic_tolerance: 0.0
  require_all_seeds: true

authorization:
  data_free_design_and_gpu_gate: true
  repository_data: false
  repository_labels: false
  pretrained_lm_probe_after_gate_pass_only: true
  dev: false
  test: false
  qrels: false
