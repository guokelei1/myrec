    "20265001": 0
    "20265002": 1
    "20265003": 2

data:
  generator_seed: 20265000
  train_examples: 4096
  validation_examples: 2048
  query_tokens: 4
  history_events: 8
  candidates: 12
  dimension: 48
  key_dimension: 12
  value_dimension: 12
  no_history_fraction: 0.20
  repeat_fraction: 0.20
  noise_std: 0.08
  validation_shift: nuisance_target_to_distractor

model:
