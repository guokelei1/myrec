candidate_id: c06
probe_id: c06_local_hodge_bidirectional_synthetic_v1
status: ready_to_lock_not_executed

paths:
  config: systems/06_conservative_wedge_flow_transformer/configs/c06_synthetic_mechanism_probe.yaml
  script: systems/06_conservative_wedge_flow_transformer/experiments/run_synthetic_mechanism_probe.py
  protocol: systems/06_conservative_wedge_flow_transformer/notes/synthetic_mechanism_probe_protocol.md
  test: systems/06_conservative_wedge_flow_transformer/tests/test_synthetic_probe.py
  lock: systems/06_conservative_wedge_flow_transformer/notes/c06_synthetic_probe_lock.json
  output: artifacts/c06_conservative_wedge_flow_transformer/synthetic_v1/report.json

execution:
  device: cpu
  dtype: float64
  training: false
  repository_data_access: forbidden
  qrels_access: forbidden
  dev_test_access: forbidden

scope:
  potential_rms_is_dimensionless_standardized_gauge: true
  factor_realizability_tested: false
  score_bound_tested: false

generation:
  seeds:
    - 20260711
    - 20260712
    - 20260713
  requests_per_seed: 4096
  candidates: 16
  history_events: 6
  request_batch_size: 128
  event_weight: 0.16666666666666666
  potential_rms: 1.0
  candidate_cycle_log_scale_std: 0.75
  event_cycle_ratio_log_std: 0.7
  noise_scale: 0.8
  variance_floor: 0.05
  numerical_epsilon: 1.0e-12

cycle:
  construction: complete_graph_double_centered_skew
  projector: "P = I - 11^T / n"
  raw_field: "A = (h h^T) * (R - R^T) / sqrt(2n)"
  projected_cycle: "C0 = P A P"
  event_rescaling: match_sampled_event_cycle_to_true_gradient_energy
  require_skew: true
  require_divergence_free: true

worlds:
  names:
    - reliability_aligned
    - reliability_decoupled
    - reliability_adversarial
  share_true_potential: true
  share_cycle: true
  share_gaussian_draws: true
  share_variance_multiset_per_request: true
  aligned_assignment: incident_cycle_energy
  decoupled_assignment: independent_permutation_within_request
  adversarial_assignment: reverse_rank_within_request

gates:
  names:
    - local_hodge
    - global_event
    - t_one
    - direct_reliability_oracle
  local_hodge: "g_ij = EG_ij / (EG_ij + EC_ij + eps)"
  global_event: "g_ij = sqrt(sum_i(EG_ij) / (sum_i(EG_ij) + sum_i(EC_ij) + eps))"
  t_one: "g_ij = 1"
  direct_reliability_oracle: "g_ij = 1 / (1 + planted_noise_variance_ij)"
  trusted_edge: "T_ikj = 0.5 * g_ij * g_kj * (u_obs_ij - u_obs_kj)"
  score: "score_i = mean_j(mean_k(T_ikj))"

metrics:
  primary: request_equal_pairwise_accuracy
  pairwise_true_tie_tolerance: 1.0e-10
  predicted_tie_credit: 0.5
  secondary: binary_top_quartile_ndcg_at_10
  relevant_candidates: 4
  ndcg_cutoff: 10
  tie_break_salt: "20260708"
  paired_bootstrap_samples: 10000
  paired_bootstrap_seed: 20260714
  paired_bootstrap_confidence: 0.95

integrity_thresholds:
  skew_max_abs: 1.0e-12
  divergence_max_abs: 1.0e-12
  hodge_recovery_max_abs: 1.0e-12
  variance_multiset_max_abs: 0.0
  aligned_mean_spearman_min: 0.999999999
  decoupled_abs_mean_spearman_max: 0.02
  adversarial_mean_spearman_max: -0.999999999

stop_rules:
  aligned:
    local_minus_t_one_pairwise_min: 0.01
    local_minus_global_pairwise_min: 0.01
    pooled_ci_low_strictly_positive: true
    all_seed_directions_positive: true
    pooled_ndcg_directions_positive: true
  decoupled:
    local_minus_t_one_pairwise_ci_high_max: 0.002
    material_harm_allowed: true
    interpretation: null_or_harm_allowed_residual_positive_gain_forbidden
  adversarial:
    local_minus_t_one_pairwise_max: -0.01
    pooled_ci_high_strictly_negative: true
    all_seed_directions_negative: true
    oracle_minus_local_pairwise_min: 0.01
    oracle_minus_local_ci_low_strictly_positive: true

interpretation:
  aligned_is_assumption_injected_positive_control: true
  decoupled_and_adversarial_are_binding_negative_controls: true
  passing_does_not_establish_real_data_coupling: true
  passing_does_not_authorize_train_internal_or_dev: true
  post_outcome_parameter_or_distribution_changes_forbidden: true

output_contract:
  include_config_sha256: true
  include_source_sha256: true
  include_protocol_sha256: true
  include_integrity: true
  include_per_seed_metrics: true
  include_pooled_metrics: true
  include_paired_bootstrap_ci: true
  include_stop_rule_verdict: true
  refuse_existing_output: true
  reuse_pre_run_manifest_without_post_outcome_rehash: true
