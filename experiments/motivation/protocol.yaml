    mechanism: specialized_reranker_pointwise_binary_cross_entropy
    batch_requests: 8
    gradient_accumulation_steps: 2
    learning_rate: 1.0e-5
  q1_instructrec_generalqwen:
    mechanism: recommendation_and_search_instruction_templates_with_normalized_candidate_response_likelihood
    adaptation: full_parameter
    batch_requests: 2
    gradient_accumulation_steps: 8
    learning_rate: 1.0e-5
    max_target_length: 96
    context_token_budget: 512
    candidate_encoding: fixed_context_budget_balanced_complete_ordinal_marked_slate
    target: exact_visible_marked_candidate_line_plus_qwen_im_end
  q2_recranker_generalqwen:
    mechanism: candidate_comparable_yes_no_logits_with_joint_ranknet_and_listnet_training
    adaptation: full_parameter
    batch_requests: 1
    gradient_accumulation_steps: 16
    learning_rate: 1.0e-5
    list_size: 8
    candidate_chunking: tensor_batching_only_with_identity_complete_coverage
    position_rotation: omitted_to_preserve_cross_chunk_candidate_comparability
    gain_ties: excluded_from_pairwise_and_shared_in_listwise_target
    pair_schedule: every_request_group_all_grade_different_pairs
    pair_component_normalization: mean_over_valid_pairs
    listwise_target: two_power_relevance_minus_one_normalized_within_group
    list_component_normalization: mean_over_request_groups
    inference_score: raw_yes_minus_no_logit
    free_generation_or_parser: omitted
    pairwise_loss_weight: 0.5
    listwise_loss_weight: 0.5
  q3_tallrec_generalqwen:
    mechanism: recommendation_alignment_with_parameter_efficient_yes_no_tuning
    adaptation: lora
    batch_requests: 2
    gradient_accumulation_steps: 8
    learning_rate: 2.0e-4
    lora_rank: 8
    lora_alpha: 16
    lora_dropout: 0.05
    lora_targets: [q_proj, v_proj]
    target: capitalized_yes_or_no_plus_qwen_im_end
  w0_copps_style_transfer_witness:
    role: non_llm_structural_witness_outside_main_table
    mechanism: different_id_same_category_semantic_history_views_with_contrastive_training
    history_budget: 6
    epochs: 2
    batch_requests: 128
    learning_rate: 1.0e-3
    projection_dim: 128
    contrastive_temperature: 0.1
    contrastive_loss_weight: 0.2
    feature_contract: frozen_transformer_cls_l2_v1
    content_feature_contract: query_context_and_canonical_item_semantics_v2
    content_encoder_fingerprint_sha256: 0527b3ecdfb3a33ccda8fbd7e434f54c2e0b77bf793e34f366a07ef9fa0e6f16
    content_store_fingerprint_sha256: 62b48e5ee25fb2b4b7ddad76d8a5f9aa732884f6b7a24ba56872d805c7cb6caf
    content_feature_text_count: 764473
    history_attention: unscaled_cosine_softmax
    semantic_replacement:
      replacement_ratio: 0.3
      category_key: deepest_complete_category
      semantic_feature: canonical_item_only_title_brand_category
      different_item_id_required: true
      exclude_all_original_history_and_current_candidates: true
      donor_population: train_visible_only
      deterministic_shortlist_size: 64
      selection: highest_frozen_bge_cosine
      missing_replacement: drop_from_augmented_view_and_audit

