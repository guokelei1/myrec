    checkpoint_id: q3_tallrec_generalqwen@ea46a89671b63741ada8
operator_families:
  residual_composition:
    branches: [attention, mlp]
    scope: registered_readout_rows_in_one_decoder_block
    modes: [identity, scale_half, scale_double, sign_flip, zero]
    holds_fixed: [incoming_residual, branch_tensor_before_coefficient, downstream_weights]
    identity_conditions: [attention_identity, mlp_identity]
  rmsnorm:
    scopes: [input, post_attention, final]
    modes:
      - identity
      - variance_scale_half
      - variance_scale_double
      - gain_scale_half
      - gain_scale_double
      - gain_sign_flip
      - zero
    holds_fixed: [hidden_input, norm_epsilon, downstream_weights, readout_positions]
    identity_conditions: [input_identity, post_attention_identity, final_identity]
conditions:
  baseline_full: true
  baseline_null: true
  full_null_each_operator_mode: true
data_policy:
  scorer_qrels_read: false
  evaluator_qrels_read_after_integrity: true
  input_field_whitelist: true
  normalized_query_cluster_bootstrap: true
mechanical_gates:
  identity_tolerance: 1.0e-5
  require_complete_finite_coverage: true
  require_shared_prompt_path_identity_q3: true
  require_exactly_once_branch_or_norm_hook: true
  require_native_operator_recomposition: true
  max_wall_seconds: 13500
interpretation:
  primary_contrast: operator_effect_minus_baseline
  secondary_contrasts: [full_null_gap_change, scale_half_vs_double, sign_flip_vs_zero]
  unresolved_if_any_identity_or_recomposition_gate_fails: true
