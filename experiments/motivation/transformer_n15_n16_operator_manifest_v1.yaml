schema_version: 1
manifest_id: transformer_n15_n16_operator_v1
analysis_stage: transformer_deep_dive_n15_n16_operator
purpose: >-
  Separate two remaining Transformer operator debts after the embedding, QK-logit,
  SwiGLU-stage, and Q/K/V projection probes: branch-residual composition and
  RMSNorm variance/gain. The intervention changes only a registered branch
  coefficient or one RMSNorm factor; token IDs, spans, masks, positions,
  projection weights, and native readout algebra remain frozen.
claim_boundary:
  diagnostic_only: true
  architecture_authorized: false
  layer_or_head_selection_authorized: false
  source_test_opened: false
  qrels_read_by_scorer: false
frozen_inputs:
  standardized_dir: data/standardized/kuaisearch/full_confirm_preceding40k_v11
  records: records_dev.jsonl
  request_count: 8000
  methods:
    - q2_recranker_generalqwen
    - q3_tallrec_generalqwen
  blocks: [13, 20, 27]
  content_control: experiments/motivation/transformer_deep_dive_manifest.yaml
