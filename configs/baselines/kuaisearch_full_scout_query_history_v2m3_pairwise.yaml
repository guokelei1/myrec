input_lock_reason: >-
  This dataset has the exact requests, candidates, labels and six-event history
  items used by the completed Full-source scout, with only each event's original
  prior query restored. A label-free token audit selected 768 so the complete
  query-plus-history sequence is preserved; the ordinary Transformer, loss and
  optimizer recipe are unchanged.
claim_boundary: >-
  This is an information-interface falsification probe, not a proposed method.
  If prior-query restoration repairs direction, the item-only architecture
  motivation must be closed or rewritten.
