schema_version: 1
config_id: kuaisearch_motivation_v11_axis_a_instructrec
protocol: experiments/motivation_v1_1/protocol.md
evidence_mode: staged_axis_a_epoch_only
axis: A_training_sufficiency_on_v1_population
test_authorized: false
proposed_architecture_authorized: false

dataset:
  dataset_id: kuaisearch
  dataset_version: full_confirm_preceding10k_v1
  standardized_dir: data/standardized/kuaisearch/full_confirm_preceding10k_v1
  evaluation_split: confirmation
  confirmation_requests: 2000
  confirmation_candidate_projection: V1_byte_identical

model:
  baseline: INSTRUCTREC-T3
  base_model_name: google/flan-t5-xl
  history_budget: 6
  max_source_length: 2048
  max_target_length: 64
  dtype: bfloat16

training:
  seeds: [20260717, 20260718]
  v1_control_epoch: 1
  epoch_extension: 2
  batch_size: 1
  gradient_accumulation_steps: 8
  effective_batch_size: 8
  learning_rate: 0.00001
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  internal_dev_fraction: 0.20
  internal_dev_partition: stable_request_id_hash
  checkpoint_selection: train_only_internal_dev_graded_ndcg_at_10
  tie_break: earliest_epoch

evaluation:
  shared_history_response_evaluator: true
  label_mode: graded
  conditions: [true, null, wrong]
  activity_epsilon: 0.01
  utility_epsilon: 0.0
  query_cluster_bootstrap_samples: 5000
  bootstrap_seed: 20260715
  test_opened: false
