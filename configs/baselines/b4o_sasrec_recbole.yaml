method_id: b4o_sasrec_recbole
dataset_id: kuaisearch
dataset_version: v0_lite
implementation_type: official_recbole
environment_group: recbole
environment_name: pps-recbole
env_freeze: configs/env/recbole.txt

standardized_dir: data/standardized/kuaisearch/v0_lite
candidate_manifest_sha256: 94eb667000e0d0f389d0a2a4d4730683b71c129043edbfcf627590376e9c123e

train_interactions:
  path: artifacts/batch2b/interactions_train.jsonl
  manifest: reports/pps_batch2b_interactions_train_manifest.json
  sha256: dcc91391c303e6e8c69506a837620be2601bdd6df249cda624f4d1caf417ad32
  input_sha256: 2c4823c3117cb11e89052b6563ed8fb40c7113400be933f01ce9db51aea9bcd8
  qrels_read: false

input_fields_used:
  - records_train.history.item_id
  - records_train.candidates.item_id
  - records_train.candidates.clicked
  - records_train.candidates.purchased
  - records_dev.history.item_id
  - records_dev.candidates.item_id

forbidden_fields:
  - records_dev.query
  - records_test.query
  - qrels_dev
  - qrels_test
  - user_global_sequence_at_inference

recbole:
  dataset_name: kuaisearch_b4o
  model: SASRec
  max_item_list_length: 50
  user_id_field: user_id
  item_id_field: item_id
  time_field: timestamp
  checkpoint_dir: artifacts/batch2b/b4o_recbole/checkpoints
  data_dir: artifacts/batch2b/b4o_recbole/atomic
  log_dir: artifacts/batch2b/b4o_recbole/log
  show_progress: false
  use_gpu: true
  gpu_id: 0

official_default_run:
  description: first KuaiSearch dev evaluation must use RecBole SASRec defaults except protocol-required input/output boundaries
  seed: 20260708
  epochs: recbole_default
  train_batch_size: recbole_default
  eval_batch_size: recbole_default
  learning_rate: recbole_default
  hidden_size: recbole_default
  n_layers: recbole_default
  n_heads: recbole_default
  hidden_dropout_prob: recbole_default
  attn_dropout_prob: recbole_default
  loss_type: CE
  train_neg_sample_args: null

search_space:
  hidden_size: [64, 128]
  n_layers: [1, 2]
  n_heads: [2, 4]
  hidden_dropout_prob: [0.2, 0.5]
  attn_dropout_prob: [0.2, 0.5]
  learning_rate: [0.001, 0.0005]
  max_item_list_length: [20, 50]
  loss_type: [CE, BPR]
  train_neg_sample_args:
    CE: null
    BPR:
      distribution: uniform
      sample_num: 1

scoring:
  inference_history: frozen_record_history_max_50
  score_definition: recbole_next_item_score_for_each_fixed_candidate
  candidate_coverage: all fixed candidates must receive exactly one score
  cold_start_policy:
    candidate_not_in_vocab: request_min_in_vocab_score_minus_margin
    margin: 1.0
    all_candidates_out_of_vocab: all_zero_scores_with_diagnostic
  diagnostics:
    - in_vocab
    - history_in_vocab_len
    - candidate_in_vocab_count
    - cold_candidate_count

tuning_budget:
  kuaisearch_dev_evals: 16
  first_eval: official_default_run
  frozen_config_seeds: [20260708, 20260709, 20260710]
  external_alignment_counts_against_budget: false

expected_outputs:
  recbole_atomic_inter: artifacts/batch2b/b4o_recbole/atomic/kuaisearch_b4o/kuaisearch_b4o.inter
  run_dir_pattern: runs/YYYYMMDD_kuaisearch_b4o_sasrec_recbole_dev_sSEED
  compare_reports:
    - reports/compare_b4o_vs_random.json
    - reports/compare_b4o_vs_b0b.json
    - reports/compare_b4o_vs_b7_bge.json
