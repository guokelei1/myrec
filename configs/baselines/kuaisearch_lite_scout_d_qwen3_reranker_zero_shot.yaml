claim_boundary: >-
  Second-family zero-shot motivation probe. The official reranking checkpoint is
  instruction-aware and multilingual, but query-plus-history serialization is not
  evidence of normal task adaptation. QC adequacy is checked before interpreting
  FULL; zero-shot failure cannot establish a shared Transformer limitation.
token_coverage_selection: >-
  The official CrossEncoder preprocess (including its default instruction/chat
  template) gives zero measured dev overflow at history budget 5. Budget 6 has a
  small overflow tail and is retained only as an unevaluated mechanical trial.
