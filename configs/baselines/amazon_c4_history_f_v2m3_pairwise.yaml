schema_version: 1
dataset_version: history_bm25_100_v1
evidence_mode: exploratory_independent_dataset_stress_test
base_model_name: BAAI/bge-reranker-v2-m3
input_modes: [qc, full]
serialization:
  qc: query_only_text_v1
  full: query_history_event_text_v1
objective: pairwise_logistic_softplus
recipe_source: frozen_from_kuaisearch_lite_before_amazon_dev_evaluation
max_length: 512
history_budget: 2
truncation_strategy: only_second
negatives_per_positive: 2
negative_sampling: seeded_uniform
batch_size: 4
gradient_accumulation_steps: 8
epochs: 2
learning_rate: 1.0e-5
weight_decay: 0.01
warmup_ratio: 0.1
seed: 20260714
input_lock_reason: >-
  Label-free v2-m3 audits show that a two-event query-history first sequence
  always fits on train and dev. only_second preserves that complete sequence
  and truncates only long candidate metadata; three events fail this guarantee
  on a small train tail. No Amazon model outcome was read before this lock.
claim_boundary: >-
  English strict-nonrepeat stress test. Amazon-C4 queries are target-review
  rewrites, have almost no repeated queries, and do not provide a valid
  recurrence positive control or natural same-query user comparison.
