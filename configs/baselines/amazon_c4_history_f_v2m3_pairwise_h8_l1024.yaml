schema_version: 1
dataset_version: history_bm25_100_v1
evidence_mode: exploratory_amazon_context_adequacy_check
base_model_name: BAAI/bge-reranker-v2-m3
input_modes: [qc, full]
serialization:
  qc: query_only_text_v1
  full: query_history_event_text_v1
objective: pairwise_logistic_softplus
recipe_source: amazon_h2_matched_recipe_with_context_capacity_only_change
max_length: 1024
history_budget: 8
truncation_strategy: only_second
negatives_per_positive: 2
negative_sampling: seeded_uniform
batch_size: 4
gradient_accumulation_steps: 8
epochs: 2
learning_rate: 1.0e-5
weight_decay: 0.01
warmup_ratio: 0.1
seed: 20260714
input_lock_reason: >-
  Before this model outcome, label-free real-tokenizer audits showed complete
  query-plus-eight-event context preservation on all train and dev requests at
  max length 1024. only_second truncates only the candidate tail. This is the
  single planned context-adequacy check for whether the earlier two-event input
  concealed a response-direction gap.
claim_boundary: >-
  Amazon-C4 is a generated, target-review-derived query task with one target
  positive and BM25-retrieved negatives. This run can diagnose context-budget
  insufficiency but cannot turn Amazon-C4 into natural search evidence.
