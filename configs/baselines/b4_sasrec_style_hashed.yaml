method_id: b4_sasrec_style_hashed
dataset_id: kuaisearch
dataset_version: v0_lite
split: dev
status: active_batch2_adapter
adapter_note: >
  RecBole 1.2.1 is not installable in the active Python 3.13 environment
  because its ray<=2.6.3 dependency has no cp313 wheel. This is a local
  SASRec-style sequence adapter over allowed item-id history fields, not an
  official RecBole run.
score_definition: >
  Online logistic ranker over candidate item bias and recent history-item to
  candidate-item transition features, plus a train-only item-bias prior
  log1p(train clicked count).
input_fields:
  - records_train.history.item_id
  - records_train.candidates.item_id
  - records_train.candidates.clicked
  - records_dev.history.item_id
  - records_dev.candidates.item_id
feature_hashing:
  n_features: 1048576
  alternate_sign: false
training:
  epochs: 1
  negatives_per_positive: 4
  max_history_len: 20
  alpha: 0.000001
multi_seed:
  required: 3
  seeds: [20260708, 20260709, 20260710]
tuning_budget:
  class: trainable
  dev_evals_budget: 16
  declared_configs: 1
qrels_read: false
