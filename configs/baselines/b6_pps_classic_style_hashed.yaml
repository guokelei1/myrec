method_id: b6_pps_classic_style_hashed
dataset_id: kuaisearch
dataset_version: v0_lite
split: dev
status: active_batch2_adapter
source_note: >
  HEM/ZAM/TEM are PPS-classic personalized product search baselines. No
  official adapter is present in this repository, so this config implements a
  transparent shallow query-history fusion adapter and must not be described as
  an official HEM/ZAM/TEM reproduction.
score_definition: >
  Online logistic PPS-style ranker over query-document, history-document, and
  gated personalization overlap features.
input_fields:
  - records_train.query
  - records_train.history.item_id
  - records_train.history.title
  - records_train.history.cat
  - records_train.candidates.item_id
  - records_train.candidates.title
  - records_train.candidates.brand
  - records_train.candidates.seller
  - records_train.candidates.cat
  - records_train.candidates.clicked
  - records_dev.query
  - records_dev.history.item_id
  - records_dev.history.title
  - records_dev.history.cat
  - records_dev.candidates.item_id
  - records_dev.candidates.title
  - records_dev.candidates.brand
  - records_dev.candidates.seller
  - records_dev.candidates.cat
feature_hashing:
  n_features: 1048576
  alternate_sign: false
training:
  epochs: 1
  negatives_per_positive: 4
  max_history_len: 20
  max_query_tokens: 12
  max_doc_tokens: 24
  tokenizer: cjk_2_3gram
  alpha: 0.000001
multi_seed:
  required: 3
  seeds: [20260708, 20260709, 20260710]
tuning_budget:
  class: trainable
  dev_evals_budget: 16
  declared_configs: 1
qrels_read: false
