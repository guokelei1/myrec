method_id: b5_kuaisearch_dcn_din_style_hashed
dataset_id: kuaisearch
dataset_version: v0_lite
split: dev
status: active_batch2_adapter
official_source:
  repo: https://github.com/benchen4395/KuaiSearch
  commit: 7ce0471b659112096f0aa7e892ed0aa4c972246a
adapter_note: >
  The official repository contains DNN/WideDeep/DCNv1/DCNv2/DIN ranking
  models, but its pipeline expects precomputed query/title embeddings and raw
  user feature files outside the standardized blind-record interface. This
  config is a compact DCN/DIN-style local adapter over allowed standardized
  fields, not an official-number alignment run.
score_definition: >
  Online logistic CTR ranker over user, query, item text/category, and
  history overlap features.
input_fields:
  - records_train.user_id
  - records_train.query
  - records_train.history.item_id
  - records_train.history.cat
  - records_train.candidates.item_id
  - records_train.candidates.title
  - records_train.candidates.brand
  - records_train.candidates.seller
  - records_train.candidates.cat
  - records_train.candidates.clicked
  - records_dev.user_id
  - records_dev.query
  - records_dev.history.item_id
  - records_dev.history.cat
  - records_dev.candidates.item_id
  - records_dev.candidates.title
  - records_dev.candidates.brand
  - records_dev.candidates.seller
  - records_dev.candidates.cat
feature_hashing:
  n_features: 1048576
  alternate_sign: false
training:
  epochs: 1
  negatives_per_positive: 4
  max_history_len: 20
  max_query_tokens: 12
  max_doc_tokens: 24
  tokenizer: cjk_2_3gram
  alpha: 0.000001
multi_seed:
  required: 3
  seeds: [20260708, 20260709, 20260710]
tuning_budget:
  class: trainable
  dev_evals_budget: 16
  declared_configs: 1
qrels_read: false
