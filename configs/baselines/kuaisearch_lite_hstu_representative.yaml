schema_version: 1
config_id: kuaisearch_lite_hstu_representative_v1
frozen_at: "2026-07-15"
purpose: exploratory_representative_architecture_motivation
scientific_evidence: exploratory
confirmation_authorized: false
test_authorized: false

dataset:
  standardized_dir: data/standardized/kuaisearch/lite_scout10k_v1
  split_train: train
  split_evaluate: dev
  history_assignments_dir: data/interim/kuaisearch/lite_scout10k_v1/history_assignments_train_donor_v2

content_features:
  store: artifacts/representative_text_features/kuaisearch_lite_v2m3_cls_l128
  contract: frozen_cross_encoder_cls_l2_v1
  model: BAAI/bge-reranker-v2-m3
  vectors_sha256: 345c1dd606ba3114b1ee242f052fa1ef61819b50200cd27c3ff1194c21e3cfd6
  trainable: false

architecture:
  name: hstu
  source: baselines/hstu
  upstream_commit: 6135bc30398f97e5786674192558d91f2ef2fa90
  adaptation: official_hstu_core_plus_shared_pps_adapter
  embedding_dim: 128
  num_blocks: 2
  num_heads: 4
  dropout_rate: 0.1
  history_budget: 8
  scorer: normalized_dot_product

matched_variants:
  qc:
    input_mode: qc
    history_during_training: false
  full:
    input_mode: full
    history_during_training: true
    inference_conditions: [true, null, wrong]

training:
  objective: multi_positive_listwise_softmax
  batch_size: 16
  gradient_accumulation_steps: 1
  epochs: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  max_grad_norm: 1.0
  seed: 20260715
  labels: qrels_train_only
  dev_labels_visible_to_training: false

evaluation:
  evaluator: scripts/evaluate_scores.py
  candidate_hash_required: true
  populations: [all, repeat, strict_nonrepeat]
  accounting: FULL_true_minus_QC_equals_base_retention_plus_history_utility

