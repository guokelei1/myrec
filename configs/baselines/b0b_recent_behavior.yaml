method_id: b0b_recent_behavior
dataset_id: kuaisearch
dataset_version: v0_lite
split: dev
score_definition: >
  sum over history events of recency_decay * event_weight *
  (3.0 item_match + 1.0 cat_l3 + 0.5 cat_l2 + 0.2 cat_l1)
input_fields:
  - records_dev.history.item_id
  - records_dev.history.cat
  - records_dev.history.event
  - records_dev.candidates.item_id
  - records_dev.candidates.cat
weights:
  item_match: 3.0
  cat_l3: 1.0
  cat_l2: 0.5
  cat_l1: 0.2
  click_event: 1.0
  purchase_event: 1.5
  recency_decay: 1/sqrt(reverse_age)
qrels_read: false
