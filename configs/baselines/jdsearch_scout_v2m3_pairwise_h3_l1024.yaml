schema_version: 1
dataset_version: hash_scout10k_v3
evidence_mode: exploratory_independent_product_search_replication
base_model_name: BAAI/bge-reranker-v2-m3
input_modes: [qc, full]
serialization:
  qc: query_only_text_v1
  full: query_history_event_text_v1_with_prior_query
objective: pairwise_logistic_softplus
recipe_source: kuaisearch_matched_pairwise_recipe_with_label_free_context_capacity_adaptation
max_length: 1024
history_budget: 3
truncation_strategy: only_second
negatives_per_positive: 2
negative_sampling: seeded_uniform
batch_size: 4
gradient_accumulation_steps: 8
epochs: 2
learning_rate: 1.0e-5
weight_decay: 0.01
warmup_ratio: 0.1
seed: 20260714
input_lock_reason: >-
  JDsearch history events contain prior-query term IDs plus product name, brand,
  category and interaction type. Label-free real-tokenizer audits show that the
  complete three-event first sequence fits every train and dev request at 1024;
  only_second truncates only candidate metadata. The rejected six-event/512
  setting did not preserve the history context and was never trained.
claim_boundary: >-
  JDsearch is a real personalized product-search source with anonymized term
  IDs. It supports functional query-conditioned ranking claims, not plaintext
  pretrained-language semantic claims.
