dataset_id: kuaisearch
dataset_version: v0_lite
identity_label: "official-code, adapter to KuaiSearch interface, not externally aligned"
implementation_type: official_code_minimal_adapter
environment_group: pps_prodsearch
environment_name: pps-prodsearch
env_manifest: configs/env/pps_prodsearch.txt

standardized_dir: data/standardized/kuaisearch/v0_lite
candidate_manifest: data/standardized/kuaisearch/v0_lite/candidate_manifest.json
candidate_manifest_sha256: 94eb667000e0d0f389d0a2a4d4730683b71c129043edbfcf627590376e9c123e
materialized_root: artifacts/b9_prodsearch/full

upstream:
  repo: https://github.com/kepingbi/ProdSearch
  commit: 449335ba652fe7c877a008e154157d7b2a4b0e76
  license: Apache-2.0
  local_dir: baselines/pps_prodsearch
  patch: reports/b9_prodsearch_patch.diff

adapter:
  policy: option_a_minimal_official_adapter
  decision: doc/baseline_notes/20260710_b9_prodsearch_adapter_protocol_decision.md
  request_query_patch: true
  synthetic_user_per_clicked_target: true
  sibling_positive_added_to_history: false
  history_source: frozen_record_history
  upstream_history_limit: 20
  tokenizer: unicode_character_without_whitespace
  item_text: title_brand_category
  valid_examples: 5000
  valid_candidate_size: 500
  dev_candidate_size: 1500
  deterministic_padding_seed: 20260708
  cold_product_policy: retain_official_untrained_item_embedding_and_report_coverage
  catalog_text_pretraining: false
  custom_trainer: false

# Frozen before any B9 dev metric is read. We run only the official/default
# point for each method; the allowed grid remains one point, so there is no
# dev-driven hyperparameter selection.
search_space:
  embedding_size: [128]
  learning_rate:
    zam: [0.002]
    tem: [0.0005]
  combinations_per_model: 1
  seeds: [20260708, 20260709, 20260710]

common:
  max_train_epoch: 20
  valid_batch_size: 16
  candidate_batch_size: 500
  num_workers: 4
  max_history_len: 20
  pv_window_size: 1
  query_encoder: fs
  decay_method: adam

models:
  zam:
    method_id: b9z_zam
    official_model_name: ZAM
    embedding_size: 128
    learning_rate: 0.002
    batch_size: 32
  tem:
    method_id: b9t_tem
    official_model_name: item_transformer
    embedding_size: 128
    learning_rate: 0.0005
    batch_size: 384
    inter_layers: 1
    ff_size: 512
    heads: 8
    use_dot_prod: true

tuning_budget:
  gpu_days_total_cap: 4
  full_training_attempts_per_model_cap: 2
  attempt_accounting: one_frozen_configuration_attempt_per_model_replicated_at_three_required_seeds
  formal_seed_count: 3
  dev_eval_rule: one frozen evaluation per final seed

internal_validity:
  random_run: 20260708_kuaisearch_random_c1
  determinism_requests: 1000
  determinism_tolerance: 0.0
  top5_review_requests: 20
  convergence_check: median_last_10_logged_training_losses_lt_median_first_10
  required: [significant_above_random, three_seeds, deterministic, top5_confirmed, loss_decreased]

forbidden_inputs:
  - records_test.jsonl
  - qrels_test.jsonl
  - qrels_dev.jsonl
  - item_catalog.jsonl
