analysis_id: c5r3_candidate_history_alignment
status: locked_before_outcome_evaluation
locked_at: "2026-07-10T21:26:00+08:00"
dataset_id: kuaisearch
dataset_version: v0_lite
target_split: dev

inputs:
  records_dev: data/standardized/kuaisearch/v0_lite/records_dev.jsonl
  candidate_manifest: data/standardized/kuaisearch/v0_lite/candidate_manifest.json
  history_present_ids: artifacts/analysis/c5r_temporal_symmetric_identity/history_present_request_ids.txt
  history_absent_ids: artifacts/analysis/c5r_temporal_symmetric_identity/history_absent_request_ids.txt

seeds:
  - 20260708
  - 20260709
  - 20260710

runs:
  d2p_pattern: 20260710_kuaisearch_d2p_text_pop_dev_s{seed}
  full_d2s_pattern: 20260710_kuaisearch_d2s_static_true_history_dev_s{seed}
  full_history: 20260708_kuaisearch_b0b_recent_behavior_dev
  item_history: 20260710_kuaisearch_c5r3_b0b_item_component_dev
  category_history: 20260710_kuaisearch_c5r3_b0b_category_component_dev
  item_d2s_pattern: 20260710_kuaisearch_c5r3_d2s_item_only_dev_s{seed}
  category_d2s_pattern: 20260710_kuaisearch_c5r3_d2s_category_only_dev_s{seed}

components:
  recency: 1/sqrt(reverse_position)
  click_weight: 1.0
  purchase_weight: 1.5
  item_match_weight: 3.0
  category_match_semantics: deepest_exclusive
  category_l3_weight: 1.0
  category_l2_weight: 0.5
  category_l1_weight: 0.2

static_mixture:
  beta: 0.3
  zscore_scope: within_request
  score_definition: beta * z(d2p) + (1 - beta) * z(history_component)

artifacts_dir: artifacts/analysis/c5r3_candidate_history_alignment

gate:
  bootstrap_samples: 10000
  bootstrap_seed: 20260708
  primary_min_significant_seeds: 2
  fallback_category_require_all_significant_seeds: true
  fallback_category_min_relative_gain: 0.02
  fallback_relative_gain_definition: mean_of_per_seed_subset_mean_ratios

claim_boundary:
  primary_if_passed: >-
    Correct rolling history contributes nonredundant fine item and coarse
    taxonomy candidate-alignment signal beyond a strong query-candidate base.
  fallback_if_passed: >-
    Correct rolling history contributes coarse candidate-history taxonomy
    alignment beyond a strong query-candidate base.
  not_supported: >-
    Randomized user-identity effects, established query-to-event attention,
    dynamic channel routing, or deployed causal personalization.
