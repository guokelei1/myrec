analysis_id: c5r2_temporal_symmetric_identity_control
status: locked_before_outcome_evaluation
locked_at: "2026-07-10T20:51:00+08:00"
dataset_id: kuaisearch
dataset_version: v0_lite
target_split: dev

inputs:
  records_train: data/standardized/kuaisearch/v0_lite/records_train.jsonl
  records_dev: data/standardized/kuaisearch/v0_lite/records_dev.jsonl
  candidate_manifest: data/standardized/kuaisearch/v0_lite/candidate_manifest.json
  window_requests: data/interim/kuaisearch/v0_lite/time_window_seed20260708/requests.jsonl
  expected_window_requests_sha256: 1bc75b89e3050e7881351fc2784d626ad5f2711ec47519c0f5db42a7f8925cd0

seeds:
  - 20260708
  - 20260709
  - 20260710

runs:
  d2p_pattern: 20260710_kuaisearch_d2p_text_pop_dev_s{seed}
  true_d2s_pattern: 20260710_kuaisearch_d2s_static_true_history_dev_s{seed}
  wrong_b0b_pattern: 20260710_kuaisearch_c5r2_b0b_temporal_wrong_dev_s{seed}
  wrong_d2s_pattern: 20260710_kuaisearch_c5r2_d2s_temporal_wrong_dev_s{seed}

static_mixture:
  beta: 0.3
  zscore_scope: within_request
  score_definition: beta * z(d2p) + (1 - beta) * z(wrong_b0b)

matching:
  donor_sources:
    - train
    - earlier_dev
  require_different_user: true
  require_donor_request_strictly_before_target: true
  insert_dev_donors_after_same_timestamp_group: true
  keep_empty_target_history_empty: true
  history_length_bins:
    - 1
    - 2
    - 4
    - 8
    - 16
    - 32
    - 50
  donor_priority:
    - normalized_query_and_history_length_bin
    - normalized_query
    - candidate_major_category_and_history_length_bin
    - candidate_major_category
    - history_length_bin
    - global
  max_donors_per_pool: 64
  max_log2_age_gap: 2.0
  freshness_top_k: 8

artifacts_dir: artifacts/analysis/c5r_temporal_symmetric_identity

gate:
  min_freshness_balanced_requests: 6000
  min_same_query_freshness_balanced_requests: 1000
  require_all_freshness_balanced_ci_lower_gt_zero: true
  same_query_min_significant_seeds: 2
  require_same_query_mean_delta_gt_zero: true
  bootstrap_samples: 10000
  bootstrap_seed: 20260708

claim_boundary:
  supported_if_passed: >-
    Correct-user rolling history has predictive identity specificity on the
    freshness-matched prequential KuaiSearch dev population.
  not_supported: >-
    Randomized causal identity effects, dynamic channel routing, or established
    query-attentive history selection.
